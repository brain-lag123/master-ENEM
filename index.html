<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM - Estudos</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <div class="container header-inner">
    <a class="logo">📚 <span>ENEM</span> Estudos</a>
    <div class="header-stats">
      <span class="header-stat" id="streak-display" style="display:none">
        🔥 Ofensiva: <span class="num" id="streak-count">0</span>
      </span>
      <span class="header-stat">
        🎯 Precisão: <span class="num" id="header-accuracy">—</span>
      </span>
      <span class="header-stat">
        📚 Tópicos: <span class="num" id="header-topics">0/0</span>
      </span>
      <button class="theme-toggle" data-action="toggle-theme" title="Alternar tema">🌙</button>
    </div>
  </div>
</header>

<main class="container">
  <div id="zona-risco-bar" class="alert-bar" style="display:none"></div>

  <nav>
    <button data-action="tab" data-tab="dashboard" class="active">📊 Painel</button>
    <button data-action="tab" data-tab="assuntos">📚 Assuntos</button>
    <button data-action="tab" data-tab="cronograma">📋 Cronograma</button>
  </nav>

  <div id="tab-dashboard" class="tabs-content active"></div>
  <div id="tab-assuntos" class="tabs-content"></div>
  <div id="tab-cronograma" class="tabs-content"></div>
</main>

<div id="study-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2><span id="modal-topic-name"></span></h2>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:12px" id="modal-topic-category"></p>

    <div id="modal-current-elo" style="margin-bottom:12px"></div>
    <div id="questions-preview" style="margin-bottom:12px"></div>
    <div id="fluency-alert"></div>

    <div class="form-group">
      <label>📝 Registrar questões</label>
      <div class="study-input-row">
        <input type="number" id="q-correct" min="0" placeholder="Acertos">
        <input type="number" id="q-total" min="1" placeholder="Total">
        <button class="btn btn-warning" data-action="log-questions">Salvar</button>
      </div>
    </div>

    <div class="form-group">
      <label>🎯 Nível de dificuldade percebido</label>
      <div class="difficulty-btns">
        <button class="difficulty-btn easy" data-action="set-difficulty" data-value="easy">😊 Fácil</button>
        <button class="difficulty-btn medium" data-action="set-difficulty" data-value="medium">🤔 Médio</button>
        <button class="difficulty-btn hard" data-action="set-difficulty" data-value="hard">😰 Difícil</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" style="flex:1" data-action="youtube" data-topic="">▶ Assistir Aula no YouTube</button>
    </div>
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-outline btn-sm" data-action="reset-topic" style="color:var(--danger);border-color:var(--danger)">↺ Resetar progresso deste tópico</button>
    </div>
  </div>
</div>

<div id="config-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2>⚙️ Configurar Prova</h2>

    <div class="form-group">
      <label>📅 Data da prova</label>
      <input type="date" id="exam-date">
    </div>
    <div class="form-group">
      <label>⏱ Horas disponíveis por dia</label>
      <input type="number" id="exam-hours" min="0.5" step="0.5" value="2">
    </div>
    <div class="form-group">
      <label>📅 Dias da semana que vai estudar</label>
      <div class="day-checkboxes">
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="0"> Dom</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="1" checked> Seg</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="2" checked> Ter</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="3" checked> Qua</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="4" checked> Qui</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="5" checked> Sex</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="6"> Sáb</label>
      </div>
    </div>
    <button class="btn btn-primary" data-action="save-config">Salvar</button>

    <hr style="margin:16px 0;border-color:var(--border)">

    <button class="btn btn-danger" data-action="reset">🔄 Resetar Todo Progresso</button>
  </div>
</div>

<div id="crono-subtopic-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2><span id="crono-subtopic-name"></span></h2>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:12px" id="crono-subtopic-category"></p>

    <div id="crono-subtopic-elo" style="margin-bottom:12px"></div>
    <div id="crono-subtopic-questions-preview" style="margin-bottom:12px"></div>
    <div id="crono-subtopic-fluency-alert"></div>

    <div id="crono-subtopic-list" style="margin: 12px 0"></div>

    <div class="form-group">
      <label>🎯 Nível de dificuldade percebido</label>
      <div class="difficulty-btns">
        <button class="difficulty-btn easy" data-action="set-difficulty" data-value="easy">😊 Fácil</button>
        <button class="difficulty-btn medium" data-action="set-difficulty" data-value="medium">🤔 Médio</button>
        <button class="difficulty-btn hard" data-action="set-difficulty" data-value="hard">😰 Difícil</button>
      </div>
    </div>

    <div class="form-group">
      <label>📝 Registrar questões</label>
      <div class="study-input-row">
        <input type="number" id="crono-q-correct" min="0" placeholder="Acertos">
        <input type="number" id="crono-q-total" min="1" placeholder="Total">
        <button class="btn btn-warning" data-action="crono-log-questions">Salvar</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" style="flex:1" data-action="youtube" data-topic="">▶ Assistir Aula no YouTube</button>
    </div>
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-outline btn-sm" data-action="reset-topic" style="color:var(--danger);border-color:var(--danger)">↺ Resetar progresso deste tópico</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
